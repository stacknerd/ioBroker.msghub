<!doctype html>
<html lang="en" data-msghub-view="adminTab">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>MessageHub</title>
	<link rel="stylesheet" href="tab.css" />
	<script src="../../lib/js/socket.io.js"></script>
</head>
<body>
	<div class="msghub-root">
		<div class="msghub-connpanel-host">
			<div id="msghub-connection" class="msghub-connectionbar offline" role="status">
				<button
					id="msghub-connection-trigger"
					type="button"
					aria-label="Connection info"
					aria-expanded="false"
					aria-controls="msghub-connection-panel"
				>i</button>
			</div>
			<div
				id="msghub-connection-panel"
				class="msghub-connpanel"
				role="tooltip"
				aria-hidden="true"
			>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.status"></span>
					<span id="msghub-conn-status"></span>
				</div>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.coreConnection"></span>
					<span id="msghub-conn-core-connection">—</span>
				</div>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.host"></span>
					<span id="msghub-conn-host">—</span>
				</div>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.adapter"></span>
					<span id="msghub-conn-adapter">—</span>
				</div>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.latency"></span>
					<span id="msghub-conn-latency">—</span>
				</div>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.version"></span>
					<span id="msghub-conn-version">—</span>
				</div>
				<hr>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.coreLanguage"></span>
					<span id="msghub-conn-core-lang">—</span>
				</div>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.backendLanguage"></span>
					<span id="msghub-conn-backend-lang">—</span>
				</div>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.browserLanguage"></span>
					<span id="msghub-conn-fe-lang">—</span>
				</div>
				<hr>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.coreFormat"></span>
					<span id="msghub-conn-core-fmt">—</span>
				</div>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.browserFormat"></span>
					<span id="msghub-conn-fe-fmt">—</span>
				</div>
				<hr>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.serverTimezone"></span>
					<span id="msghub-conn-server-tz">—</span>
				</div>
				<div class="msghub-connpanel-row">
					<span data-i18n="msghub.i18n.core.admin.ui.connection.panel.field.browserTimezone"></span>
					<span id="msghub-conn-fe-tz">—</span>
				</div>
				<div id="msghub-conn-tz-hint" class="is-hidden" aria-hidden="true">
					<hr>
					<span class="msghub-connpanel-accent" data-i18n="msghub.i18n.core.admin.ui.connection.panel.tzHint"></span></div>
			</div>
		</div>
		<div id="msghub-layout"></div>

		<!-- Universal UI infrastructure (always in DOM; JS toggles aria-hidden + is-hidden) -->
		<div id="msghub-toast-host" class="msghub-toast-host is-hidden" aria-hidden="true" aria-live="polite"
			aria-atomic="true" aria-relevant="additions text"></div>
		<div id="msghub-overlay-large" class="msghub-overlay-backdrop is-hidden" aria-hidden="true">
			<div class="msghub-overlay" role="dialog" aria-modal="true" aria-labelledby="msghub-overlay-large-title">
				<div class="msghub-overlay-head">
					<div id="msghub-overlay-large-title" class="msghub-overlay-title"></div>
					<button id="msghub-overlay-large-close" type="button" class="msghub-overlay-close">
						Close
					</button>
				</div>
				<div id="msghub-overlay-large-body" class="msghub-overlay-body"></div>
			</div>
		</div>
		<div id="msghub-dialog-small" class="msghub-dialog-backdrop is-hidden" aria-hidden="true">
			<div class="msghub-dialog" role="dialog" aria-modal="true" aria-labelledby="msghub-dialog-small-title"
				aria-describedby="msghub-dialog-small-body">
				<h6 id="msghub-dialog-small-title" class="msghub-dialog-title"></h6>
				<div id="msghub-dialog-small-body" class="msghub-dialog-body"></div>
				<div class="msghub-dialog-actions">
					<button id="msghub-dialog-small-cancel" type="button">
						Cancel
					</button>
					<button id="msghub-dialog-small-confirm" type="button">
						OK
					</button>
				</div>
			</div>
		</div>

		<!-- Core context menu primitive (always in DOM; JS toggles aria-hidden + is-hidden) -->
		<div id="msghub-contextmenu" class="msghub-contextmenu-host is-hidden" aria-hidden="true"></div>
	</div>
	<script src="tab/globals.js"></script>
	<script src="tab/registry.js"></script>
	<script src="tab/api.js"></script>
	<script src="tab/runtime.js"></script>
	<script src="tab/ui.js"></script>
	<script src="tab/layout.js"></script>
	<script src="tab/boot.js"></script>
	<script src="tab.js"></script>
</body>
</html>
